        <h1>Club Culturel El Medina</h1>

    <nav class="main-nav" aria-label="Menu principal">

        <span></span>

</header>

<main>
    <h2 id="register-titre">Inscription à l'événement</h2>
    <form id="register-form" method="get" action="#">
        <div class="form-container">

            <label for="nom">Nom complet :</label>
            <input type="text" id="nom" name="nom" required placeholder="ex: Ahmed Ben Ali">

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required placeholder="ex: user@club.tn">

            <label for="telephone">Téléphone :</label>
            <input type="tel" id="telephone" name="telephone" placeholder="ex: 98123456" required>

            <label for="places">Nombre de places :</label>
            <input type="number" id="places" name="places" min="1" max="10" value="1" required>

            <label for="message">Remarques (optionnel) :</label>
            <textarea id="message" name="message" rows="4" placeholder="Une remarque particulière ?"></textarea>

            <div id="success-message" class="success" style="display: none;"></div>
            <div id="error-message" class="error" style="display: none;"></div>

            <button type="submit" class="btn btn-primary">S'inscrire</button>
        </div>
    </form>
</main>
